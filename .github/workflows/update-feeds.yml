name: Update lastposts.json

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .

      - run: node fetch-feeds.mjs

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add lastposts.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update lastposts.json"
            git push
          fi
